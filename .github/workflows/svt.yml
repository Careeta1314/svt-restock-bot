name: SVT PRO Restock Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo apt-get install -y npm
          npm install -g pup

      - name: Fetch page
        run: |
          curl -s https://shop.weverse.io/en/shop/KRW/artists/7 > page.html

      - name: Extract items
        run: |
          cat page.html | pup 'a[href*="/sales/"] json{}' > items.json

      - name: Compare and detect restock
        run: |
          if [ -f old.json ]; then

            COUNT=$(jq length items.json)

            for i in $(seq 0 $(($COUNT-1))); do

              NEW=$(jq .[$i] items.json)
              OLD=$(jq .[$i] old.json 2>/dev/null || echo '{}')

              NEW_TEXT=$(echo "$NEW" | jq -r '.text')
              OLD_TEXT=$(echo "$OLD" | jq -r '.text')

              if echo "$OLD_TEXT" | grep -q "SOLD OUT" && ! echo "$NEW_TEXT" | grep -q "SOLD OUT"; then

                NAME=$(echo "$NEW_TEXT")
                LINK=$(echo "$NEW" | jq -r '.href')
                IMAGE=$(echo "$NEW" | jq -r '.children[0].children[0].attrs.src // empty')

                curl -X POST -H "Content-Type: application/json" \
                -d "{
                  \"embeds\": [{
                    \"title\": \"🚨 SEVENTEEN RESTOCK\",
                    \"description\": \"🛍 $NAME\",
                    \"url\": \"https://shop.weverse.io$LINK\",
                    \"image\": {\"url\": \"$IMAGE\"},
                    \"color\": 16711680
                  }]
                }" \
                ${{ secrets.DISCORD_WEBHOOK }}

              fi
            done
          fi

          cp items.json old.json
