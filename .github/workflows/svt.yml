name: SVT Restock Bot (Fancy Embed + First Run Test Emoji)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Python packages
        run: pip install requests

      - name: Run Restock Bot (Fancy Embed + First Run Test Emoji)
        run: |
          python <<EOF
          import os, json, requests
          from datetime import datetime

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          REGIONS = ["KR", "JP"]
          FILE = "old.json"
          first_run = not os.path.exists(FILE)
          now = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          # 🔹 讀舊資料
          if first_run:
              old_map = {}
          else:
              with open(FILE) as f:
                  old = json.load(f)
                  old_map = {i["id"]: i for i in old}

          # 🔹 真正抓商品流程（KR/JP）
          API = "https://api.weverse.io/shop/v1/products"
          HEADERS = {"User-Agent": "Mozilla/5.0", "Accept": "application/json"}
          items = []

          for region in REGIONS:
              try:
                  resp = requests.get(API, headers=HEADERS, params={"artistId": 7, "country": region}, timeout=10)
                  products = resp.json().get("data", [])
                  for p in products:
                      name = p.get("name")
                      price = p.get("price","N/A")
                      stock = p.get("inStock", False)
                      link = f"https://shop.weverse.io/en/shop/KRW/artists/7"
                      img = p.get("thumbnail", None) or p.get("image", None)
                      items.append({
                          "id": f"{name}_{region}",
                          "name": name,
                          "price": price,
                          "sold_out": not stock,
                          "region": region,
                          "link": link,
                          "image": img
                      })
              except Exception as e:
                  print(region, "ERROR", e)

          # 🔹 第一次 run → 發單條模擬 test embed
          if first_run and WEBHOOK:
              description_lines = []
              for item in items:
                  region_emoji = "🇰🇷" if item["region"]=="KR" else "🇯🇵"
                  description_lines.append(f"{region_emoji} **{item['region']}**\n🛍 **{item['name']}**\n💰 {item['price']}")
              description_lines.append(f"⏰ {now} (Test Embed - Green)")
              embed = {
                  "title": "🧪 TEST RESTOCK (First Run)",
                  "description": "\n\n".join(description_lines),
                  "color": 65280  # 綠色表示 test
              }
              requests.post(WEBHOOK, json={"embeds": [embed]})

          # 🔹 後續補貨檢查
          for item in items:
              item_id = item["id"]
              if not first_run and item_id in old_map:
                  old_item = old_map[item_id]
                  if old_item["sold_out"] and not item["sold_out"]:
                      color = 16711680 if item["region"]=="KR" else 3447003
                      region_emoji = "🇰🇷" if item["region"]=="KR" else "🇯🇵"
                      embed = {
                          "title": "🚨 SEVENTEEN RESTOCK",
                          "description": f"{region_emoji} **{item['region']}**\n🛍 **{item['name']}**\n💰 {item['price']}\n⏰ {now}",
                          "url": item["link"],
                          "color": color
                      }
                      if item["image"]:
                          embed["thumbnail"] = {"url": item["image"]}
                      if WEBHOOK:
                          requests.post(WEBHOOK, json={"embeds": [embed]})

          # 🔹 保存最新資料
          with open(FILE, "w") as f:
              json.dump(items, f)
          EOF
