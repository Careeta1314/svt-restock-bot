name: SVT Restock Bot (Single Msg + Test Once)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v3
      - name: Install Python packages
        run: pip install requests beautifulsoup4 pytz

      - name: Run Restock Bot + Test Embed
        run: |
          python <<EOF
          import os, json, requests
          from datetime import datetime
          import pytz
          from bs4 import BeautifulSoup

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("Discord webhook not set")
              exit(1)

          FLAG_FILE = "test_sent.flag"
          OLD_FILE = "old.json"
          REGIONS = ["KR", "JP"]
          tz_hk = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz_hk).strftime("%Y.%m.%d %H:%M:%S HKT")

          first_run = not os.path.exists(OLD_FILE)
          if first_run:
              old_map = {}
          else:
              with open(OLD_FILE) as f:
                  old_map = {i["id"]: i for i in json.load(f)}

          # ---- Test Embed 一次性 ----
          if not os.path.exists(FLAG_FILE):
              test_url = "https://shop.weverse.io/en/shop/KRW/artists/7/sales/55715"
              try:
                  resp = requests.get(test_url, timeout=10)
                  soup = BeautifulSoup(resp.text, "html.parser")

                  # 自動抓商品名稱
                  name_tag = soup.find("meta", {"property":"og:title"})
                  name = name_tag["content"] if name_tag else "Unknown Product"

                  # 自動抓售價
                  price_tag = soup.find("meta", {"property":"product:price:amount"})
                  price = "KRW₩" + price_tag["content"] if price_tag else "N/A"

                  # 自動抓縮圖
                  og_img = soup.find("meta", {"property":"og:image"})
                  image_url = og_img["content"] if og_img else ""

                  item = {
                      "id": "test_55715",
                      "name": name,
                      "price": price,
                      "link": test_url,
                      "region": "Test",
                      "image": image_url
                  }

                  embed = {
                      "title": f"🟢 {item['name']} 補貨啦‼️",
                      "color": 65280,
                      "fields": [
                          {"name": "補貨通路 Test", "value": "\u200b"},
                          {"name": "**📦商品名稱**", "value": item['name']},
                          {"name": "**💰售價**", "value": item['price']},
                          {"name": "**🕐補貨時間**", "value": now_hk},
                          {"name": "**🔗商品連結**", "value": item['link']}
                      ],
                      "thumbnail": {"url": item["image"]} if item["image"] else None
                  }

                  requests.post(WEBHOOK, json={"embeds":[embed]})
                  with open(FLAG_FILE, "w") as f:
                      f.write("done")
                  print("✅ Test Embed 自動抓 info 發送完成")

              except Exception as e:
                  print("❌ Test Embed 發送出錯:", e)

          # ---- 正式 KR/JP 補貨監控，每個商品單獨發訊息 ----
          API = "https://api.weverse.io/shop/v1/products"
          HEADERS = {"User-Agent": "Mozilla/5.0", "Accept": "application/json"}
          items = []

          for region in REGIONS:
              try:
                  resp = requests.get(API, headers=HEADERS, params={"artistId": 7, "country": region}, timeout=10)
                  products = resp.json().get("data", [])
                  for p in products:
                      name = p.get("name")
                      price = p.get("price","N/A")
                      stock = p.get("inStock", False)
                      link = f"https://shop.weverse.io/en/shop/KRW/artists/7"
                      img = p.get("thumbnail", None) or p.get("image", None)
                      items.append({
                          "id": f"{name}_{region}",
                          "name": name,
                          "price": price,
                          "sold_out": not stock,
                          "region": region,
                          "link": link,
                          "image": img
                      })
              except Exception as e:
                  print(region, "ERROR", e)

          for item in items:
              item_id = item["id"]
              if not first_run and item_id in old_map:
                  old_item = old_map[item_id]
                  if old_item["sold_out"] and not item["sold_out"]:
                      color = 16711680 if item["region"]=="KR" else 3447003
                      region_emoji = "🇰🇷" if item["region"]=="KR" else "🇯🇵"

                      embed = {
                          "title": f"{region_emoji} {item['name']} 補貨啦‼️",
                          "color": color,
                          "fields": [
                              {"name": f"補貨通路 {region_emoji} {item['region']}", "value": "\u200b"},
                              {"name": "**📦商品名稱**", "value": item['name']},
                              {"name": "**💰售價**", "value": item['price']},
                              {"name": "**🕐補貨時間**", "value": now_hk},
                              {"name": "**🔗商品連結**", "value": item['link']}
                          ],
                          "thumbnail": {"url": item["image"]} if item["image"] else None
                      }

                      # 單獨發每個商品
                      requests.post(WEBHOOK, json={"embeds":[embed]})

          # 存檔
          with open(OLD_FILE, "w") as f:
              json.dump(items, f)
          EOF
