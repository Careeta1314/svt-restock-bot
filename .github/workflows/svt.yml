name: SVT Restock Bot (Force 7400 Test Embed)

on:
  workflow_dispatch:

jobs:
  force_test:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Python packages
        run: pip install requests pytz
      - name: Force Send 7400 Test Embed
        run: |
          python <<EOF
          import os, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("ERROR: DISCORD_WEBHOOK not set")
              exit(1)

          tz_hk = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz_hk).strftime("%Y.%m.%d %H:%M:%S")

          # 強行設定 sales/7400 商品資料
          item = {
              "name": "The Thirteen Tapes (TTT) vol.2/13 WOOZI",
              "price": "KRW ₩16,500",
              "time": now_hk,
              "link": "https://shop.weverse.io/en/shop/KRW/artists/7/sales/7400",
              "image": "https://shop.weverse.io/shop-v1/products/7400/thumbnail.jpg"  # 可以換成真實縮圖
          }

          embed = {
              "title": f"🟢 {item['name']} 補貨啦‼️",
              "color": 65280,
              "fields": [
                  {"name": "**📦商品名稱**", "value": item['name']},
                  {"name": "**💰售價**", "value": item['price']},
                  {"name": "**🕐補貨時間**", "value": item['time'] + " HKT"},
                  {"name": "**🔗商品連結**", "value": item['link']}
              ],
              "thumbnail": {"url": item.get("image","")}
          }

          try:
              r = requests.post(WEBHOOK, json={"embeds": [embed]})
              print("Discord POST STATUS:", r.status_code, r.text)
          except Exception as e:
              print("Discord POST ERROR:", e)
          EOF
