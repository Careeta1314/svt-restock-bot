name: SVT Test Embed with Thumbnail

on:
  workflow_dispatch:

jobs:
  test_embed:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Install Python
        run: pip install requests pytz
      - name: Send Test Embed
        run: |
          python <<EOF
          import os, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("Webhook not set")
              exit(1)

          tz_hk = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz_hk).strftime("%Y.%m.%d %H:%M:%S")

          # Test 商品資料（公開可訪問圖片）
          item = {
              "name": "The Thirteen Tapes (TTT) vol.2/13 WOOZI",
              "price": "KRW ₩16,500",
              "time": now_hk + " HKT",
              "link": "https://shop.weverse.io/en/shop/KRW/artists/7/sales/7400",
              "image": "https://i.imgur.com/your_test_image.jpg"  # ✅ 公開圖床 URL
          }

          embed = {
              "title": f"🟢 {item['name']} 補貨啦‼️",
              "color": 65280,
              "fields": [
                  {"name": "補貨通路 Test", "value": "\u200b"},
                  {"name": "**📦商品名稱**", "value": item['name']},
                  {"name": "**💰售價**", "value": item['price']},
                  {"name": "**🕐補貨時間**", "value": item['time']},
                  {"name": "**🔗商品連結**", "value": item['link']}
              ],
              "thumbnail": {"url": item['image']}
          }

          r = requests.post(WEBHOOK, json={"embeds":[embed]})
          print("status:", r.status_code, r.text)
          EOF
