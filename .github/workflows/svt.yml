name: SVT Thumbnail Test Embed

on:
  workflow_dispatch:

jobs:
  test_embed:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Install Python
        run: pip install requests pytz
      - name: Send Thumbnail Test Embed
        run: |
          python <<EOF
          import os, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("ERROR: DISCORD_WEBHOOK not set")
              exit(1)

          # 用已知公開可訪問縮圖
          test_item = {
              "name": "The Thirteen Tapes (TTT) vol.2/13 WOOZI",
              "price": "KRW ₩16,500",
              "link": "https://shop.weverse.io/en/shop/KRW/artists/7/sales/7400",
              "image": "https://i.imgur.com/your_test_image.jpg"  # ✅ 公開圖床
          }

          # 香港時間
          tz = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz).strftime("%Y.%m.%d %H:%M:%S HKT")

          # 建 Embed
          embed = {
              "title": f"🟢 {test_item['name']} 補貨啦‼️",
              "color": 65280,
              "fields": [
                  {"name": "補貨通路 Test", "value": "\u200b"},
                  {"name": "**📦商品名稱**", "value": test_item['name']},
                  {"name": "**💰售價**", "value": test_item['price']},
                  {"name": "**🕐補貨時間**", "value": now_hk},
                  {"name": "**🔗商品連結**", "value": test_item['link']}
              ],
              "thumbnail": {"url": test_item['image']}
          }

          r = requests.post(WEBHOOK, json={"embeds": [embed]})
          print("Discord POST:", r.status_code, r.text)
          EOF
