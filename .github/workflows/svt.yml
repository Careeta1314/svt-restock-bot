name: Weverse API Thumbnail Test (56223)

on:
  workflow_dispatch:

jobs:
  test_thumbnail:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Install Python
        run: pip install requests pytz
      - name: Send API Thumbnail Test Embed
        run: |
          python <<EOF
          import os, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("DISCORD_WEBHOOK not set")
              exit(1)

          # fetch product list for KR to find the 56223 item
          API = "https://api.weverse.io/shop/v1/products"
          HEADERS = {"User-Agent":"Mozilla/5.0", "Accept":"application/json"}
          resp = requests.get(API, headers=HEADERS, params={"artistId":7, "country":"KR"})
          resp.raise_for_status()
          products = resp.json().get("data", [])

          target = None
          for p in products:
              # try matching sale id or name
              if "56223" in str(p.get("id","")) or "56223" in p.get("name",""):
                  target=p
                  break
          if not target and products:
              target = products[0]

          name = target.get("name","N/A")
          price = target.get("price","N/A")
          img = target.get("thumbnail") or target.get("image") or ""
          link = "https://shop.weverse.io/en/shop/KRW/artists/7/sales/56223"

          tz = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz).strftime("%Y.%m.%d %H:%M:%S HKT")

          # embed
          embed = {
              "title": f"🔎 API Thumbnail Test | {name}",
              "color": 65280,
              "fields": [
                  {"name":"📦 商品名稱","value":name},
                  {"name":"💰 售價","value":price},
                  {"name":"🕐 時間","value":now_hk},
                  {"name":"📷 圖片 URL","value": img or "No image url found"},
                  {"name":"🔗 商品連結","value": link}
              ],
              "thumbnail": {"url": img} if img else None
          }

          requests.post(WEBHOOK, json={"embeds":[embed]})
          EOF
