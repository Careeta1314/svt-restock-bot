name: SVT Test Embed (56222)

on:
  workflow_dispatch:

jobs:
  send_test:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Install Python
        run: pip install requests pytz
      - name: Send 56222 Test Embed
        run: |
          python <<EOF
          import os, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("ERROR: DISCORD_WEBHOOK not set")
              exit(1)

          # 香港時間
          tz = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz).strftime("%Y.%m.%d %H:%M:%S HKT")

          # 固定測試商品 56222
          item = {
              "name": "S/S T‑Shirt Black Ver.2",
              "price": "KRW ₩55,000",
              "time": now_hk,
              "link": "https://shop.weverse.io/en/shop/KRW/artists/7/sales/56222",
              "image": "https://cdn-contents.weverseshop.io/public/shop/ac66af21a06a7e2768233a8e9e0317ed.png?w=720&q=95"
          }

          # 組 Embed
          embed = {
              "title": f"🟢 {item['name']} 補貨啦‼️",
              "color": 65280,
              "fields": [
                  {"name": "補貨通路 Test", "value": "\u200b"},
                  {"name": "**📦商品名稱**", "value": item['name']},
                  {"name": "**💰售價**", "value": item['price']},
                  {"name": "**🕐補貨時間**", "value": item['time']},
                  {"name": "**🔗商品連結**", "value": item['link']}
              ],
              "thumbnail": {"url": item['image']}
          }

          # 發送到 Discord
          try:
              r = requests.post(WEBHOOK, json={"embeds":[embed]})
              print("status:", r.status_code, r.text)
          except Exception as e:
              print("Discord POST ERROR:", e)
          EOF
