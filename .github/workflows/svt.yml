name: SVT Thumbnail Test 56223

on:
  workflow_dispatch:

jobs:
  test_embed:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Install Python
        run: pip install requests
      - name: Send Thumbnail Test Embed
        run: |
          python <<EOF
          import os, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("Webhook not set")
              exit(1)

          tz = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz).strftime("%Y.%m.%d %H:%M:%S HKT")

          item = {
              "name": "S/S T‑Shirt Black Ver.2",
              "price": "KRW ₩55,000",
              "time": now_hk,
              "link": "https://shop.weverse.io/en/shop/KRW/artists/7/sales/56223",
              "image": "https://i.imgur.com/akdW9tX.jpg"
          }

          embed = {
              "title": f"🟢 {item['name']} 補貨啦‼️",
              "color": 65280,
              "fields": [
                  {"name": "補貨通路 Test", "value": "\u200b"},
                  {"name": "**📦商品名稱**", "value": item['name']},
                  {"name": "**💰售價**", "value": item['price']},
                  {"name": "**🕐補貨時間**", "value": item['time']},
                  {"name": "**🔗商品連結**", "value": item['link']}
              ],
              "thumbnail": {"url": item['image']}
          }

          r = requests.post(WEBHOOK, json={"embeds":[embed]})
          print("Discord POST:", r.status_code, r.text)
          EOF
