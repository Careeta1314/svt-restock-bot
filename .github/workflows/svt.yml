name: SVT Restock Bot (Test + Thumbnail)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Python packages
        run: pip install requests pytz

      - name: Run Restock Bot (Test + Thumbnail)
        run: |
          python <<EOF
          import os, json, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          REGIONS = ["KR", "JP"]
          FILE = "old.json"
          first_run = not os.path.exists(FILE)

          # 香港時間
          tz_hk = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz_hk).strftime("%Y.%m.%d %H:%M:%S HKT")

          # 讀舊資料
          if first_run:
              old_map = {}
          else:
              with open(FILE) as f:
                  old = json.load(f)
                  old_map = {i["id"]: i for i in old}

          # 7400 商品資料作 Test Embed
          test_item = {
              "id": "The_Thirteen_Tapes_KR",
              "name": "The Thirteen Tapes (TTT) vol.2/13 WOOZI",
              "price": "KRW ₩16,500",
              "sold_out": False,
              "region": "KR",
              "link": "https://shop.weverse.io/en/shop/KRW/artists/7/sales/7400",
              "image": "https://i.imgur.com/your_test_image.jpg"  # ✅ 公開可訪問圖床
          }

          # 第一次 run → Test Embed
          if first_run and WEBHOOK:
              embed = {
                  "title": f"🟢 {test_item['name']} 補貨啦‼️",
                  "color": 65280,
                  "fields": [
                      {"name": f"補貨通路 Test", "value": "\u200b"},
                      {"name": "**📦商品名稱**", "value": test_item['name']},
                      {"name": "**💰售價**", "value": test_item['price']},
                      {"name": "**🕐補貨時間**", "value": now_hk},
                      {"name": "**🔗商品連結**", "value": test_item['link']}
                  ],
                  "thumbnail": {"url": test_item['image']}
              }
              requests.post(WEBHOOK, json={"embeds": [embed]})

          # 抓商品流程（正式 restock）
          API = "https://api.weverse.io/shop/v1/products"
          HEADERS = {"User-Agent": "Mozilla/5.0", "Accept": "application/json"}
          items = []

          for region in REGIONS:
              try:
                  resp = requests.get(API, headers=HEADERS, params={"artistId": 7, "country": region}, timeout=10)
                  products = resp.json().get("data", [])
                  for p in products:
                      name = p.get("name")
                      price = p.get("price","N/A")
                      stock = p.get("inStock", False)
                      link = f"https://shop.weverse.io/en/shop/KRW/artists/7"
                      img = p.get("thumbnail", None) or p.get("image", None)
                      items.append({
                          "id": f"{name}_{region}",
                          "name": name,
                          "price": price,
                          "sold_out": not stock,
                          "region": region,
                          "link": link,
                          "image": img
                      })
              except Exception as e:
                  print(region, "ERROR", e)

          # 補貨檢查
          for item in items:
              item_id = item["id"]
              if not first_run and item_id in old_map:
                  old_item = old_map[item_id]
                  if old_item["sold_out"] and not item["sold_out"]:
                      color = 16711680 if item["region"]=="KR" else 3447003
                      region_emoji = "🇰🇷" if item["region"]=="KR" else "🇯🇵"
                      embed = {
                          "title": f"{'🔴' if item['region']=='KR' else '🔵'} {item['name']} 補貨啦‼️",
                          "color": color,
                          "fields": [
                              {"name": f"補貨通路 {region_emoji}", "value": "\u200b"},
                              {"name": "**📦商品名稱**", "value": item['name']},
                              {"name": "**💰售價**", "value": item['price']},
                              {"name": "**🕐補貨時間**", "value": now_hk},
                              {"name": "**🔗商品連結**", "value": item['link']}
                          ],
                          "thumbnail": {"url": item['image']} if item['image'] else None
                      }
                      if WEBHOOK:
                          requests.post(WEBHOOK, json={"embeds": [embed]})

          # Save JSON
          with open(FILE, "w") as f:
              json.dump(items, f)
          EOF
