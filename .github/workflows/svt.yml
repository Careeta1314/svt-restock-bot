name: SVT Restock Bot (Fancy Embed + First Run Test Emoji + HKT Time)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Python packages
        run: pip install requests pytz

      - name: Run Restock Bot (Test + HKT Time)
        run: |
          python <<EOF
          import os, json, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          REGIONS = ["KR", "JP"]
          FILE = "old.json"
          first_run = not os.path.exists(FILE)

          # 香港時間
          tz_hk = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz_hk).strftime("%Y-%m-%d %H:%M:%S")

          # 讀舊資料
          if first_run:
              old_map = {}
          else:
              with open(FILE) as f:
                  old = json.load(f)
                  old_map = {i["id"]: i for i in old}

          # 抓商品資料
          API = "https://api.weverse.io/shop/v1/products"
          HEADERS = {"User-Agent": "Mozilla/5.0", "Accept": "application/json"}
          items = []

          for region in REGIONS:
              try:
                  resp = requests.get(API, headers=HEADERS, params={"artistId": 7, "country": region}, timeout=10)
                  products = resp.json().get("data", [])
                  for p in products:
                      name = p.get("name")
                      price = p.get("price","N/A")
                      stock = p.get("inStock", False)
                      link = f"https://shop.weverse.io/en/shop/KRW/artists/7/sales/7400"  # 模擬真實 link
                      img = p.get("thumbnail", None) or p.get("image", None)
                      items.append({
                          "id": f"{name}_{region}",
                          "name": name,
                          "price": price,
                          "sold_out": not stock,
                          "region": region,
                          "link": link,
                          "image": img
                      })
              except Exception as e:
                  print(region, "ERROR", e)

          # ------------------------
          # 第一次 run → Test embed
          # ------------------------
          if first_run and WEBHOOK:
              embeds = []
              for item in items:
                  region_emoji = "🇰🇷" if item["region"]=="KR" else "🇯🇵"
                  embed = {
                      "title": "🧪 TEST RESTOCK (First Run)",
                      "description": f"{region_emoji} **{item['region']}**  🛍 **{item['name']}**  💰 {item['price']}  ⏰ {now_hk}",
                      "url": item["link"],
                      "color": 65280  # 綠色
                  }
                  if item["image"]:
                      embed["thumbnail"] = {"url": item["image"]}
                  embeds.append(embed)
              requests.post(WEBHOOK, json={"embeds": embeds})

          # ------------------------
          # 正式補貨檢查
          # ------------------------
          for item in items:
              item_id = item["id"]
              if not first_run and item_id in old_map:
                  old_item = old_map[item_id]
                  if old_item["sold_out"] and not item["sold_out"]:
                      color = 16711680 if item["region"]=="KR" else 3447003
                      region_emoji = "🇰🇷" if item["region"]=="KR" else "🇯🇵"
                      embed = {
                          "title": "🚨 SEVENTEEN RESTOCK",
                          "description": f"{region_emoji} **{item['region']}**  🛍 **{item['name']}**  💰 {item['price']}  ⏰ {now_hk}",
                          "url": item["link"],
                          "color": color
                      }
                      if item["image"]:
                          embed["thumbnail"] = {"url": item["image"]}
                      requests.post(WEBHOOK, json={"embeds": [embed]})

          # Save JSON
          with open(FILE, "w") as f:
              json.dump(items, f)
          EOF
