name: Discord Simple Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Install Python
        run: pip install requests
      - name: Send Simple Test
        run: |
          python <<EOF
          import os, requests

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("Webhook not set")
              exit(1)

          r = requests.post(WEBHOOK, json={"content":"Hello! Test message from GitHub Actions"})
          print("status:", r.status_code, r.text)
          EOF
