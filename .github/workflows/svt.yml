name: SVT Restock Bot (Guaranteed Test + HKT Time)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Python packages
        run: pip install requests pytz

      - name: Run Restock Bot (Guaranteed Test)
        run: |
          python <<EOF
          import os, json, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("ERROR: DISCORD_WEBHOOK not set")
              exit(1)

          FILE = "old.json"
          first_run = not os.path.exists(FILE)

          # 香港時間
          tz_hk = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz_hk).strftime("%Y-%m-%d %H:%M:%S")

          # ------------------------
          # 第一次跑 → 強制發 Test Embed
          # ------------------------
          if first_run and WEBHOOK:
              # 使用 sales/7400 商品資料 hardcode 發一條 embed
              embed = {
                  "title": "🧪 TEST RESTOCK (First Run)",
                  "description": "🇰🇷 **KR**  🛍 **Seventeen Album / Item Sample**  💰 12345  ⏰ " + now_hk,
                  "url": "https://shop.weverse.io/en/shop/KRW/artists/7/sales/7400",
                  "color": 65280
              }
              try:
                  r = requests.post(WEBHOOK, json={"embeds": [embed]})
                  print("Discord POST:", r.status_code, r.text)
              except Exception as e:
                  print("Discord POST ERROR:", e)

          # ------------------------
          # 正式補貨檢查
          # ------------------------
          REGIONS = ["KR", "JP"]
          API = "https://api.weverse.io/shop/v1/products"
          HEADERS = {"User-Agent": "Mozilla/5.0", "Accept": "application/json"}
          items = []

          for region in REGIONS:
              try:
                  resp = requests.get(API, headers=HEADERS, params={"artistId": 7, "country": region}, timeout=10)
                  resp.raise_for_status()
                  products = resp.json().get("data", [])
                  for p in products:
                      name = p.get("name","N/A")
                      price = p.get("price","N/A")
                      stock = p.get("inStock", False)
                      link = f"https://shop.weverse.io/en/shop/KRW/artists/7"
                      img = p.get("thumbnail", None) or p.get("image", None)
                      items.append({
                          "id": f"{name}_{region}",
                          "name": name,
                          "price": price,
                          "sold_out": not stock,
                          "region": region,
                          "link": link,
                          "image": img
                      })
              except Exception as e:
                  print(region, "ERROR", e)

          if not first_run and items:
              try:
                  with open(FILE) as f:
                      old_map = {i["id"]: i for i in json.load(f)}
              except Exception as e:
                  print("Load old.json ERROR:", e)
                  old_map = {}

              for item in items:
                  item_id = item["id"]
                  if item_id in old_map:
                      old_item = old_map[item_id]
                      if old_item["sold_out"] and not item["sold_out"]:
                          color = 16711680 if item["region"]=="KR" else 3447003
                          region_emoji = "🇰🇷" if item["region"]=="KR" else "🇯🇵"
                          embed = {
                              "title": "🚨 SEVENTEEN RESTOCK",
                              "description": f"{region_emoji} **{item['region']}**  🛍 **{item['name']}**  💰 {item['price']}  ⏰ {now_hk}",
                              "url": item["link"],
                              "color": color
                          }
                          if item["image"]:
                              embed["thumbnail"] = {"url": item["image"]}
                          try:
                              r = requests.post(WEBHOOK, json={"embeds": [embed]})
                              print("Discord POST:", r.status_code, r.text)
                          except Exception as e:
                              print("Discord POST ERROR:", e)

          # Save JSON
          try:
              with open(FILE, "w") as f:
                  json.dump(items, f)
          except Exception as e:
              print("Save JSON ERROR:", e)
          EOF
