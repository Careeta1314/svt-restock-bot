name: SVT Restock Bot (Beautiful Embed + Forced Test + HKT Time)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Python packages
        run: pip install requests pytz

      - name: Run Restock Bot (Final Version)
        run: |
          python <<EOF
          import os, json, requests
          from datetime import datetime
          import pytz

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK")
          if not WEBHOOK:
              print("ERROR: DISCORD_WEBHOOK not set")
              exit(1)

          FILE = "old.json"
          first_run = not os.path.exists(FILE)

          tz_hk = pytz.timezone("Asia/Hong_Kong")
          now_hk = datetime.now(tz_hk).strftime("%Y.%m.%d %H:%M:%S")

          # 建立 embed function
          def create_embed(item, region=None, test=False):
              if test:
                  color = 65280
                  title = f"🟢 {item['name']} 補貨啦‼️"
              else:
                  if region=="KR":
                      color = 16711680
                      title = f"🔴 {item['name']} 補貨啦‼️"
                  else:
                      color = 3447003
                      title = f"🔵 {item['name']} 補貨啦‼️"

              embed = {
                  "title": title,
                  "color": color,
                  "fields": [
                      {"name": "**📦商品名稱**", "value": item['name']},
                      {"name": "**💰售價**", "value": item['price']},
                      {"name": "**🕐補貨時間**", "value": item['time'] + " HKT"},
                      {"name": "**🔗商品連結**", "value": item['link']}
                  ],
                  "thumbnail": {"url": item.get("image", "")}
              }
              return embed

          # ------------------------
          # 第一次跑 → 強制 Test Embed (抓 sales/7400 真實縮圖)
          # ------------------------
          if first_run and WEBHOOK:
              try:
                  # 抓 KR 國家商品資料
                  API_ONE = "https://api.weverse.io/shop/v1/products"
                  HEADERS = {"User-Agent": "Mozilla/5.0", "Accept": "application/json"}
                  params = {"artistId": 7, "country": "KR"}
                  resp_one = requests.get(API_ONE, headers=HEADERS, params=params, timeout=10)
                  resp_one.raise_for_status()
                  products_one = resp_one.json().get("data", [])

                  # 找 sales/7400 商品
                  test_item_data = None
                  for p in products_one:
                      if p.get("name","").find("7400") != -1:
                          test_item_data = p
                          break
                  if not test_item_data and products_one:
                      test_item_data = products_one[0]  # fallback

                  if test_item_data:
                      name = test_item_data.get("name","N/A")
                      price = test_item_data.get("price","N/A")
                      img = test_item_data.get("thumbnail") or test_item_data.get("image") or ""
                      link = "https://shop.weverse.io/en/shop/KRW/artists/7/sales/7400"

                      test_item = {
                          "name": name,
                          "price": price,
                          "time": now_hk,
                          "link": link,
                          "image": img
                      }

                      embed = create_embed(test_item, test=True)
                      r = requests.post(WEBHOOK, json={"embeds": [embed]})
                      print("Discord Test POST:", r.status_code, r.text)

              except Exception as e:
                  print("Test API ERROR:", e)

          # ------------------------
          # 正式補貨檢查
          # ------------------------
          REGIONS = ["KR", "JP"]
          API = "https://api.weverse.io/shop/v1/products"
          HEADERS = {"User-Agent": "Mozilla/5.0", "Accept": "application/json"}
          items = []

          for region in REGIONS:
              try:
                  resp = requests.get(API, headers=HEADERS, params={"artistId": 7, "country": region}, timeout=10)
                  resp.raise_for_status()
                  products = resp.json().get("data", [])
                  for p in products:
                      name = p.get("name","N/A")
                      price = p.get("price","N/A")
                      stock = p.get("inStock", False)
                      link = f"https://shop.weverse.io/en/shop/KRW/artists/7"
                      img = p.get("thumbnail", None) or p.get("image", None)
                      items.append({
                          "id": f"{name}_{region}",
                          "name": name,
                          "price": price,
                          "sold_out": not stock,
                          "region": region,
                          "link": link,
                          "image": img,
                          "time": now_hk
                      })
              except Exception as e:
                  print(region, "ERROR", e)

          # 正式補貨發送
          if not first_run and items:
              try:
                  with open(FILE) as f:
                      old_map = {i["id"]: i for i in json.load(f)}
              except Exception as e:
                  print("Load old.json ERROR:", e)
                  old_map = {}

              for item in items:
                  item_id = item["id"]
                  if item_id in old_map:
                      old_item = old_map[item_id]
                      if old_item["sold_out"] and not item["sold_out"]:
                          embed = create_embed(item, region=item["region"])
                          try:
                              r = requests.post(WEBHOOK, json={"embeds": [embed]})
                              print("Discord POST:", r.status_code, r.text)
                          except Exception as e:
                              print("Discord POST ERROR:", e)

          # Save JSON
          try:
              with open(FILE, "w") as f:
                  json.dump(items, f)
          except Exception as e:
              print("Save JSON ERROR:", e)
          EOF
